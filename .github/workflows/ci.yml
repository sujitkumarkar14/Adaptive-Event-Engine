name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Documentation index (required docs present)
        run: npm run docs:generate
      - name: Lint
        run: npm run lint
      - name: Unit tests and coverage
        run: npm test -- --reporter=dot
      - name: Production build
        run: npm run build
      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps
      - name: E2E smoke tests
        run: npm run test:e2e
      - name: Functions — install, build, test
        run: |
          cd functions
          npm ci
          npm run build
          npm test
  functions-emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Emulator — integration test + load snapshot
        run: |
          cd functions
          npm ci
          npm run build
          cd ..
          npx firebase-tools@14.7.0 emulators:exec --only auth,functions,firestore --project adaptive-entry \
            "cd functions && RUN_EMULATOR_TESTS=1 npm test -- emulator.integration && cd .. && LOAD_TEST_URL=http://127.0.0.1:5001/adaptive-entry/us-central1/reserveEntrySlot npm run test:load"
      - uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: artifacts/load-test-results.json
